name: Deploy code to EC2 after GitHub push

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/test_web_server
            git pull origin main
            source .venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart test_web_server
