name: Build and Deploy Docker Images on push

on:
  push:
    tags:
      - "v*.*.*"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ml-review-analysis-dashboard/backend
  ECR_REGISTRY: 596953737242.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_DEV_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_DEV_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
          -t $ECR_REPOSITORY:${{ github.sha }} .

      - name: Tag image with version
        run: |
          docker tag \
          $ECR_REPOSITORY:${{ github.sha }} \
          $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.ref_name }}

      - name: Tag image with commit SHA
        run: |
          docker tag \
          $ECR_REPOSITORY:${{ github.sha }} \
          $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
      
      - name: Push images
        run: |
          docker push \
          $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.ref_name }}
      
          docker push \
          $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

  deploy:

    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            ECR_REGISTRY="596953737242.dkr.ecr.us-east-1.amazonaws.com"
            ECR_REPOSITORY="ml-review-analysis-dashboard/backend"

            aws ecr get-login-password \
            --region us-east-1 | \
            docker login \
            --username AWS \
            --password-stdin \
            $ECR_REGISTRY

            docker pull \
            $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.ref_name }}

            docker stop backend || true

            docker rm backend || true

            docker run -d \
            --name backend \
            --restart unless-stopped \
            -p 8000:8000 \
            $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.ref_name }}
